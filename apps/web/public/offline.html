<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PlateIQ | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: rgba(24, 24, 27, 0.92);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #fafafa;
        --muted: #a1a1aa;
        --accent: #ff7a00;
        --accent-soft: rgba(255, 122, 0, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 122, 0, 0.18), transparent 28%),
          linear-gradient(180deg, #111318 0%, var(--bg) 68%);
      }

      main {
        width: min(100%, 420px);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(24px);
        box-shadow: 0 32px 100px -40px rgba(0, 0, 0, 0.9);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.65;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
      }

      button {
        background: linear-gradient(135deg, #ff9f22 0%, var(--accent) 100%);
        color: #111318;
        font-weight: 700;
      }

      a {
        color: var(--text);
        background: var(--accent-soft);
        box-shadow: inset 0 0 0 1px rgba(255, 122, 0, 0.2);
      }

      .status {
        margin-top: 20px;
        font-size: 0.94rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You&apos;re offline.</h1>
      <p>PlateIQ can still open from your home screen and keep some cached data available, but this view needs a connection before it can refresh account-aware content.</p>
      <div class="actions">
        <button id="retry" type="button">Try again</button>
        <a href="/continue">Open sign-in</a>
      </div>
      <p class="status" id="status">Waiting for a network connection.</p>
    </main>

    <script>
      const status = document.getElementById('status');
      const retry = document.getElementById('retry');

      async function tryReload() {
        status.textContent = 'Checking connection…';

        try {
          const response = await fetch('/manifest.json', { cache: 'no-store' });
          if (response.ok) {
            window.location.reload();
            return;
          }
        } catch (error) {
          // Ignore and keep retrying.
        }

        status.textContent = 'Still offline. We will retry automatically.';
      }

      retry.addEventListener('click', () => {
        void tryReload();
      });

      window.addEventListener('online', () => {
        status.textContent = 'Connection restored. Reloading…';
        window.location.reload();
      });

      window.setInterval(() => {
        void tryReload();
      }, 3500);
    </script>
  </body>
</html>
